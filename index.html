<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অফিস প্রেজেন্ট ও এডমিন প্যানেল</title>
    <!-- Firebase App CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firebase Realtime Database CDN -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        .admin-btn {
            background-color: #008CBA;
        }
        .admin-btn:hover {
            background-color: #007bb5;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #f2f2f2;
        }
        .hidden {
            display: none;
        }
        .back-btn {
            background-color: #f44336;
            width: auto;
            padding: 8px 15px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<!-- হোম স্ক্রিন -->
<div class="container" id="home-screen">
    <h2>অফিস প্রেজেন্ট সিস্টেম</h2>
    <button onclick="showUserView()">ইউজার হাজিরা প্যানেল</button>
    <button class="admin-btn" onclick="showAdminView()">এডমিন প্যানেল</button>
</div>

<!-- ইউজার হাজিরা স্ক্রিন -->
<div class="container hidden" id="user-screen">
    <button class="back-btn" onclick="showHome()">হোমে ফিরে যান</button>
    <h3>হাজিরা (Attendance) ফর্ম</h3>
    <input type="text" id="userName" placeholder="আপনার নাম লিখুন">
    <input type="text" id="userPhone" placeholder="আপনার আইডি বা ফোন নাম্বার">
    <button onclick="submitAttendance()">লোকেশনসহ প্রেজেন্ট দিন</button>
    <p id="status-msg" style="font-weight: bold; margin-top: 15px;"></p>
</div>

<!-- এডমিন প্যানেল স্ক্রিন -->
<div class="container hidden" id="admin-screen">
    <button class="back-btn" onclick="showHome()">হোমে ফিরে যান</button>
    <h3>এডমিন প্যানেল (উপস্থিতির তালিকা)</h3>
    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>নাম</th>
                    <th>আইডি</th>
                    <th>সময়</th>
                    <th>লোকেশন</th>
                </tr>
            </thead>
            <tbody id="attendance-table-body">
                <!-- ডাটা এখানে স্বয়ংক্রিয়ভাবে লোড হবে -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // 🔥 আপনার ফায়ারবেস কনফিগারেশন এখানে বসাতে হবে (Google Firebase থেকে ফ্রি ডাটাবেজ তৈরি করে কোডটি বসাবেন)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // ফায়ারবেস ইনিশিয়ালাইজ
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showUserView() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('user-screen').classList.remove('hidden');
        document.getElementById('admin-screen').classList.add('hidden');
    }

    function showAdminView() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('user-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');
        loadAttendanceData();
    }

    function showHome() {
        document.getElementById('home-screen').classList.remove('hidden');
        document.getElementById('user-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.add('hidden');
    }

    function submitAttendance() {
        const name = document.getElementById('userName').value.trim();
        const phone = document.getElementById('userPhone').value.trim();
        const msg = document.getElementById('status-msg');

        if (!name || !phone) {
            msg.style.color = "red";
            msg.innerText = "দয়া করে নাম এবং আইডি দিন!";
            return;
        }

        msg.style.color = "blue";
        msg.innerText = "লোকেশন ট্র্যাক করা হচ্ছে...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const time = new Date().toLocaleString();

                const attendanceData = {
                    name: name,
                    phone: phone,
                    time: time,
                    location: `Lat: ${lat.toFixed(4)}, Lon: ${lon.toFixed(4)}`
                };

                // ডাটাবেজে সেভ করা হচ্ছে
                db.ref('attendance/').push(attendanceData, (error) => {
                    if (error) {
                        msg.style.color = "red";
                        msg.innerText = "প্রেজেন্ট জমা করতে সমস্যা হয়েছে!";
                    } else {
                        msg.style.color = "green";
                        msg.innerText = "সফলভাবে প্রেজেন্ট দেওয়া হয়েছে!";
                        document.getElementById('userName').value = '';
                        document.getElementById('userPhone').value = '';
                    }
                });

            }, function(error) {
                msg.style.color = "red";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        msg.innerText = "লোকেশন পারমিশন দেওয়া হয়নি! দয়া করে অন করুন।";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        msg.innerText = "লোকেশন তথ্য পাওয়া যাচ্ছে না।";
                        break;
                    case error.TIMEOUT:
                        msg.innerText = "লোকেশন পেতে অনেক সময় লাগছে।";
                        break;
                    default:
                        msg.innerText = "অজানা ত্রুটি ঘটেছে।";
                }
            }, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            });
        } else {
            msg.style.color = "red";
            msg.innerText = "আপনার ব্রাউজার লোকেশন সাপোর্ট করে না।";
        }
    }

    function loadAttendanceData() {
        const tableBody = document.getElementById('attendance-table-body');
        db.ref('attendance/').on('value', (snapshot) => {
            tableBody.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(item => {
                    const row = `<tr>
                        <td>${item.name}</td>
                        <td>${item.phone}</td>
                        <td>${item.time}</td>
                        <td>${item.location}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } else {
                tableBody.innerHTML = `<tr><td colspan="4">এখনো কেউ প্রেজেন্ট দেয়নি।</td></tr>`;
            }
        });
    }
</script>
</body>
</html>
