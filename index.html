<!DOCTYPE html>
<html lang="bn" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #10B981;
            --danger: #EF4444;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }
        [data-theme="dark"] {
            --bg-color: #111827;
            --card-bg: #1F2937;
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); transition: 0.3s; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        
        /* Glassmorphism Cards */
        .card { background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); margin-bottom: 20px; }
        
        /* Typography & Inputs */
        h2 { text-align: center; margin-bottom: 20px; font-weight: 600; color: var(--primary); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-size: 14px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; background: transparent; color: var(--text-main); font-size: 15px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        /* Buttons */
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #fff; }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: #4338CA; }
        .btn-success { background: var(--secondary); }
        .btn-danger { background: var(--danger); margin-top: 10px; }
        
        /* Display None Utility */
        .hidden { display: none !important; }
        
        /* Dashboard Specific */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .clock { font-size: 24px; font-weight: bold; text-align: center; color: var(--primary); margin: 15px 0; font-family: monospace;}
        
        .notice-board { background: #FEF3C7; color: #92400E; padding: 15px; border-radius: 8px; border-left: 4px solid #F59E0B; margin-bottom: 20px; font-size: 14px; }
        [data-theme="dark"] .notice-board { background: #451A03; color: #FDE68A; }
        
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; text-align: center; }
        .stat-box { background: rgba(79, 70, 229, 0.1); padding: 15px 5px; border-radius: 8px; }
        .stat-box h3 { font-size: 20px; margin-bottom: 5px; }
        .stat-box p { font-size: 12px; }
        
        /* Offline Alert */
        #offline-alert { background: var(--danger); color: white; text-align: center; padding: 10px; position: fixed; top: 0; width: 100%; left: 0; z-index: 1000; }
        
        /* Admin Button Hidden */
        .secret-admin { position: fixed; bottom: 10px; right: 10px; color: var(--text-muted); opacity: 0.3; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div id="offline-alert" class="hidden"><i class="fas fa-wifi"></i> ইন্টারনেট কানেকশন নেই!</div>

    <div class="container">
        
        <!-- Screen 1: Registration/Login -->
        <div id="auth-screen" class="card">
            <h2><i class="fas fa-fingerprint"></i> Smart Attendance</h2>
            <p style="text-align: center; font-size: 14px; margin-bottom: 15px;">অনুগ্রহ করে আপনার তথ্য দিয়ে প্রবেশ করুন</p>
            <div class="input-group">
                <label>আপনার নাম (Name)</label>
                <input type="text" id="reg-name" placeholder="উদাঃ রাব্বি হাসান">
            </div>
            <div class="input-group">
                <label>মোবাইল নাম্বার (Phone)</label>
                <input type="tel" id="reg-phone" placeholder="017XXXXXXXX">
            </div>
            <div class="input-group">
                <label>এমপ্লয়ি আইডি (Employee ID)</label>
                <input type="text" id="reg-id" placeholder="EMP-101">
            </div>
            <button class="btn btn-primary" onclick="registerUser()">প্রবেশ করুন</button>
        </div>

        <!-- Screen 2: User Dashboard -->
        <div id="user-dashboard" class="card hidden">
            <div class="header-top">
                <div>
                    <h3 id="user-display-name">হ্যালো, ইউজার</h3>
                    <p style="font-size: 12px; color: var(--text-muted);" id="user-display-id">ID: ---</p>
                </div>
                <button onclick="toggleTheme()" style="background:none; border:none; color:var(--text-main); font-size: 20px; cursor:pointer;"><i class="fas fa-moon"></i></button>
            </div>

            <div class="clock" id="live-clock">00:00:00</div>

            <div class="notice-board" id="user-notice">
                <strong><i class="fas fa-bell"></i> নোটিশ:</strong> <span id="notice-text">আজকের নোটিশ লোড হচ্ছে...</span>
            </div>

            <div id="video-wrapper" class="hidden">
                <div class="video-container">
                    <iframe id="admin-video" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box" style="color:var(--secondary)">
                    <h3 id="stat-present">0</h3>
                    <p>উপস্থিতি</p>
                </div>
                <div class="stat-box" style="color:var(--danger)">
                    <h3 id="stat-absent">0</h3>
                    <p>অনুপস্থিতি</p>
                </div>
                <div class="stat-box" style="color:#F59E0B">
                    <h3 id="stat-late">0</h3>
                    <p>লেট</p>
                </div>
            </div>

            <p id="location-status" style="text-align: center; font-size: 13px; color: var(--secondary); margin-bottom: 15px; font-weight: 600;"></p>

            <button class="btn btn-success" id="btn-checkin" onclick="checkIn()"><i class="fas fa-sign-in-alt"></i> চেক-ইন করুন</button>
            <button class="btn btn-danger" id="btn-checkout" onclick="checkOut()"><i class="fas fa-sign-out-alt"></i> চেক-আউট করুন</button>
            
            <button class="btn" style="background:#6B7280; margin-top: 10px;" onclick="requestLeave()"><i class="fas fa-calendar-times"></i> ছুটির আবেদন</button>
        </div>

        <!-- Screen 3: Admin Dashboard (Hidden) -->
        <div id="admin-dashboard" class="card hidden">
            <h2><i class="fas fa-user-shield"></i> এডমিন প্যানেল</h2>
            <div style="display:flex; justify-content:space-between; margin-bottom: 15px;">
                <button class="btn btn-success" style="width: 48%; padding: 8px;" onclick="exportCSV()"><i class="fas fa-download"></i> CSV Export</button>
                <button class="btn btn-danger" style="width: 48%; padding: 8px;" onclick="closeAdmin()">বন্ধ করুন</button>
            </div>
            
            <div class="input-group">
                <label>অফিসে ঢোকার সময় (Entry Time)</label>
                <input type="time" id="admin-entry-time">
            </div>
            <div class="input-group">
                <label>লক হওয়ার সময় (Lock Time)</label>
                <input type="time" id="admin-lock-time">
            </div>
            <div class="input-group">
                <label>ছুটির সময় (Leave Time)</label>
                <input type="time" id="admin-leave-time">
            </div>
            <div class="input-group">
                <label>সবাইকে নোটিশ দিন</label>
                <input type="text" id="admin-notice" placeholder="আজকের নোটিশ লিখুন...">
            </div>
            <div class="input-group">
                <label>ইউটিউব ভিডিও লিঙ্ক (Embed URL)</label>
                <input type="text" id="admin-video-link" placeholder="https://www.youtube.com/embed/...">
            </div>
            <button class="btn btn-primary" onclick="saveAdminSettings()">সেটিংস আপডেট করুন</button>

            <hr style="margin: 20px 0; border: 0.5px solid #E5E7EB;">
            <h3>কর্মীদের তালিকা ও লোকেশন</h3>
            <div class="input-group" style="margin-top: 10px;">
                <input type="text" id="search-emp" placeholder="নাম বা আইডি দিয়ে খুঁজুন..." onkeyup="searchEmployee()">
            </div>
            <div id="employee-list" style="max-height: 250px; overflow-y: auto; font-size: 14px;">
                <!-- List will generate here -->
            </div>
        </div>

    </div>

    <!-- Hidden Secret Admin Trigger -->
    <i class="fas fa-cog secret-admin" onclick="promptAdmin()"></i>

    <script>
        // --- 1. Global Configurations ---
        const ADMIN_PASS = "Rabby11";
        
        // Office GPS Location (Mesh Network Office)
        const OFFICE_LAT = 23.885038;
        const OFFICE_LNG = 90.324319;
        const ALLOWED_RADIUS = 20; // In meters (অফিস থেকে সর্বোচ্চ ২০ মিটারের ভেতর থাকতে হবে)

        let currentUser = null;
        
        // Mock Database for testing (Replace with Firebase Firestore later)
        let systemSettings = JSON.parse(localStorage.getItem('sysSettings')) || {
            entryTime: "09:00", lockTime: "10:00", leaveTime: "17:00", 
            notice: "সবাইকে সময়মতো অফিসে আসার অনুরোধ করা হলো।", videoUrl: ""
        };
        let usersData = JSON.parse(localStorage.getItem('usersData')) || [];

        // --- 2. Initialization ---
        window.onload = () => {
            setInterval(updateClock, 1000);
            checkNetwork();
            
            const savedUser = localStorage.getItem('loggedUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showScreen('user-dashboard');
                loadDashboardData();
            } else {
                showScreen('auth-screen');
            }
        };

        // --- 3. UI Control Functions ---
        function showScreen(screenId) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('user-dashboard').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.add('hidden');
            document.getElementById(screenId).classList.remove('hidden');
        }

        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'light' ? 'dark' : 'light');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('en-US', { hour12: true });
        }

        // --- 4. Network Checking ---
        window.addEventListener('offline', checkNetwork);
        window.addEventListener('online', checkNetwork);
        function checkNetwork() {
            const alert = document.getElementById('offline-alert');
            if (!navigator.onLine) { alert.classList.remove('hidden'); } 
            else { alert.classList.add('hidden'); }
        }

        // --- 5. Geolocation Math (Haversine Formula) ---
        function getDistanceFromLatLonInM(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth's radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; 
        }

        // --- 6. User Functions ---
        function registerUser() {
            const name = document.getElementById('reg-name').value;
            const phone = document.getElementById('reg-phone').value;
            const id = document.getElementById('reg-id').value;

            if(!name || !phone || !id) return alert("সব তথ্য পূরণ করুন!");

            currentUser = { 
                name, phone, id, present: 0, absent: 0, late: 0, 
                device: navigator.userAgent, lastLocationLink: "" 
            };
            
            let existing = usersData.find(u => u.id === id);
            if(!existing) usersData.push(currentUser);
            else currentUser = existing;
            
            localStorage.setItem('usersData', JSON.stringify(usersData));
            localStorage.setItem('loggedUser', JSON.stringify(currentUser));
            
            showScreen('user-dashboard');
            loadDashboardData();
        }

        function loadDashboardData() {
            document.getElementById('user-display-name').innerText = `হ্যালো, ${currentUser.name}`;
            document.getElementById('user-display-id').innerText = `ID: ${currentUser.id}`;
            document.getElementById('notice-text').innerText = systemSettings.notice;
            
            if(systemSettings.videoUrl) {
                document.getElementById('video-wrapper').classList.remove('hidden');
                document.getElementById('admin-video').src = systemSettings.videoUrl;
            } else {
                document.getElementById('video-wrapper').classList.add('hidden');
            }

            document.getElementById('stat-present').innerText = currentUser.present || 0;
            document.getElementById('stat-absent').innerText = currentUser.absent || 0;
            document.getElementById('stat-late').innerText = currentUser.late || 0;
        }

        function checkIn() {
            if (navigator.geolocation) {
                document.getElementById('location-status').innerHTML = "লোকেশন চেক করা হচ্ছে, অপেক্ষা করুন...";
                
                navigator.geolocation.getCurrentPosition((pos) => {
                    const userLat = pos.coords.latitude;
                    const userLng = pos.coords.longitude;
                    
                    // Calculate distance from office
                    const distance = getDistanceFromLatLonInM(OFFICE_LAT, OFFICE_LNG, userLat, userLng);
                    
                    if (distance > ALLOWED_RADIUS) {
                        document.getElementById('location-status').innerHTML = `<span style="color:red;"><i class="fas fa-times-circle"></i> আপনি অফিস থেকে ${Math.round(distance)} মিটার দূরে আছেন!</span>`;
                        return alert(`চেক-ইন বাতিল! আপনি অফিস থেকে ${Math.round(distance)} মিটার দূরে আছেন। অফিসের ৫০ মিটারের ভেতর থেকে চেষ্টা করুন।`);
                    }

                    // Create a Google Maps Link for Admin
                    currentUser.lastLocationLink = `https://www.google.com/maps?q=${userLat},${userLng}`;
                    
                    const timeNow = new Date().toTimeString().slice(0,5);
                    let status = "Present";
                    
                    if(timeNow > systemSettings.lockTime) {
                        return alert("অফিসে ঢোকার সময় পার হয়ে গেছে! চেক-ইন লকড।");
                    } else if (timeNow > systemSettings.entryTime) {
                        status = "Late";
                        currentUser.late += 1;
                        alert("আপনি লেট করেছেন!");
                    } else {
                        currentUser.present += 1;
                        alert("চেক-ইন সফল হয়েছে!");
                    }
                    
                    // Display success message on User UI
                    document.getElementById('location-status').innerHTML = `<i class="fas fa-map-marker-alt"></i> লোকেশন ভেরিফাইড! আপনি অফিস থেকে ${Math.round(distance)} মিটার দূরে আছেন।`;
                    
                    updateUserDB();
                    loadDashboardData();
                }, (error) => {
                    document.getElementById('location-status').innerHTML = "";
                    alert("লোকেশন পারমিশন অন করুন! লোকেশন ছাড়া হাজিরা দেওয়া যাবে না।");
                }, { enableHighAccuracy: true }); // High accuracy for better GPS tracking
            } else {
                alert("আপনার ডিভাইস লোকেশন সাপোর্ট করে না।");
            }
        }

        function checkOut() {
            const timeNow = new Date().toTimeString().slice(0,5);
            if(timeNow < systemSettings.leaveTime) {
                let conf = confirm("ছুটির সময়ের আগেই বের হতে চান?");
                if(!conf) return;
            }
            alert("সফলভাবে চেক-আউট হয়েছে। সাবধানে বাড়ি যান!");
        }

        function requestLeave() {
            let reason = prompt("ছুটির কারণ লিখুন:");
            if(reason) alert("আপনার ছুটির আবেদন এডমিনের কাছে পাঠানো হয়েছে।");
        }

        function updateUserDB() {
            localStorage.setItem('loggedUser', JSON.stringify(currentUser));
            let index = usersData.findIndex(u => u.id === currentUser.id);
            if(index > -1) usersData[index] = currentUser;
            localStorage.setItem('usersData', JSON.stringify(usersData));
        }

        // --- 7. Admin Panel Functions (Hidden Logic) ---
        function promptAdmin() {
            const pass = prompt("Enter Admin Secret Key:");
            if(pass === ADMIN_PASS) {
                showScreen('admin-dashboard');
                loadAdminPanel();
            } else if (pass !== null) {
                alert("ভুল পাসওয়ার্ড!");
            }
        }

        function closeAdmin() {
            if(currentUser) showScreen('user-dashboard');
            else showScreen('auth-screen');
        }

        function loadAdminPanel() {
            document.getElementById('admin-entry-time').value = systemSettings.entryTime;
            document.getElementById('admin-lock-time').value = systemSettings.lockTime;
            document.getElementById('admin-leave-time').value = systemSettings.leaveTime;
            document.getElementById('admin-notice').value = systemSettings.notice;
            document.getElementById('admin-video-link').value = systemSettings.videoUrl;
            renderEmployeeList(usersData);
        }

        function saveAdminSettings() {
            systemSettings.entryTime = document.getElementById('admin-entry-time').value;
            systemSettings.lockTime = document.getElementById('admin-lock-time').value;
            systemSettings.leaveTime = document.getElementById('admin-leave-time').value;
            systemSettings.notice = document.getElementById('admin-notice').value;
            systemSettings.videoUrl = document.getElementById('admin-video-link').value;
            
            localStorage.setItem('sysSettings', JSON.stringify(systemSettings));
            alert("সিস্টেম সেটিংস আপডেট হয়েছে! সবার অ্যাপে এটি দেখা যাবে।");
            loadDashboardData();
        }

        function renderEmployeeList(data) {
            const list = document.getElementById('employee-list');
            list.innerHTML = '';
            data.forEach(user => {
                let locBadge = user.lastLocationLink 
                    ? `<a href="${user.lastLocationLink}" target="_blank" style="color:var(--primary); font-weight:bold; text-decoration:none;"><i class="fas fa-map-marker-alt"></i> ম্যাপে দেখুন</a>` 
                    : `<span style="color:var(--danger)">লোকেশন পাওয়া যায়নি</span>`;
                
                list.innerHTML += `
                    <div style="background:#F3F4F6; color:#000; padding:12px; border-radius:5px; margin-bottom:8px; border-left: 4px solid var(--primary);">
                        <strong>${user.name}</strong> (${user.id})<br>
                        <div style="font-size:12px; margin-top:5px; margin-bottom:5px;">
                            Present: <strong>${user.present}</strong> | Late: <strong>${user.late}</strong> | Absent: <strong>${user.absent}</strong>
                        </div>
                        <div style="font-size:12px;">
                            ${locBadge}
                        </div>
                    </div>
                `;
            });
        }

        function searchEmployee() {
            const query = document.getElementById('search-emp').value.toLowerCase();
            const filtered = usersData.filter(u => u.name.toLowerCase().includes(query) || u.id.toLowerCase().includes(query));
            renderEmployeeList(filtered);
        }

        function exportCSV() {
            let csvContent = "data:text/csv;charset=utf-8,Name,ID,Phone,Present,Late,Absent,Last_Location\n";
            usersData.forEach(e => {
                let row = `${e.name},${e.id},${e.phone},${e.present},${e.late},${e.absent},${e.lastLocationLink || 'N/A'}`;
                csvContent += row + "\n";
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "attendance_report.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
